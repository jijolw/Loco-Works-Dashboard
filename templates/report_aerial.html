<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workshop Aerial View & Targets Report</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #ffffff;
            --card-bg: #ffffff;
            --border-color: #cbd5e1;
            --text-main: #0f172a;
            --text-muted: #475569;
            --gold: #b45309;
            --blue-normal: #e0f2fe;
            --blue-border: #38bdf8;
            --blue-text: #0369a1;
            --red-danger: #fee2e2;
            --red-border: #f87171;
            --red-text: #991b1b;
            --yellow-done: #fef9c3;
            --yellow-border: #fde047;
            --yellow-text: #854d0e;
            --green-outturned: #dcfce7;
            --green-border: #4ade80;
            --green-text: #14532d;
            --orange-corr: #ffedd5;
            --orange-border: #fb923c;
            --orange-text: #9a3412;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 8px;
            overflow-x: hidden;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            font-size: 14px;
            font-weight: 500;
        }
        .spinner {
            border: 3px solid rgba(0,0,0,0.1);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border-left-color: var(--blue-border);
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Page Layout wrapper */
        .report-page {
            max-width: 1350px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* Header block */
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 4px;
        }
        .report-title {
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-main);
        }
        .report-date {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Targets & Achievements table */
        .targets-section {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px 8px;
        }
        .section-title {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--gold);
            margin-bottom: 4px;
        }
        .targets-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 10px;
        }
        .targets-table th {
            text-align: left;
            padding: 3px 6px;
            background: #f1f5f9;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
        }
        .targets-table td {
            padding: 3px 6px;
            border-bottom: 1px dotted var(--border-color);
        }
        .targets-table tr:last-child td {
            border-bottom: none;
            font-weight: 700;
            background: #f8fafc;
        }
        .var-neg { color: #dc2626; font-weight: 600; }
        .var-pos { color: #16a34a; font-weight: 600; }

        /* Floating action buttons */
        .no-print-actions {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }
        .btn-action {
            background: #2563eb;
            color: #ffffff;
            border: none;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn-action:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }
        .btn-back {
            background: #64748b;
        }
        .btn-back:hover {
            background: #475569;
        }

        /* ── Map Grid layout ── */
        .map-section {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .shops-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }

        /* Zones & Shops */
        .zone {
            border: 1px solid var(--border-color);
            background: #f8fafc;
            border-radius: 6px;
            padding: 4px;
        }
        .zone-title {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 3px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 2px;
        }

        .line-row {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 3px;
        }
        .line-row:last-child {
            margin-bottom: 0;
        }
        .line-name {
            width: 70px;
            font-size: 8.5px;
            font-weight: 600;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .coach-row {
            display: flex;
            gap: 4px;
            flex-grow: 1;
        }

        /* Coach Box Card */
        .coach-box {
            width: 82px;
            height: 40px;
            border-radius: 4px;
            padding: 2px 4px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            box-sizing: border-box;
        }
        .empty-box {
            width: 82px;
            height: 40px;
            border-radius: 4px;
            border: 1px dashed var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            color: rgba(0,0,0,0.25);
        }

        .cb-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .cb-num {
            font-size: 8.5px;
            font-weight: 700;
            letter-spacing: 0.1px;
        }
        .c-badge {
            font-size: 6.5px;
            font-weight: 700;
            padding: 0.5px 1.5px;
            border-radius: 1.5px;
            text-transform: uppercase;
        }
        .badge-lhb { background: #3b82f6; color: #fff; }
        .badge-tw { background: #ec4899; color: #fff; }
        .badge-icf { background: #10b981; color: #fff; }
        .badge-nmg { background: #f59e0b; color: #000; }
        .badge-tc { background: #8b5cf6; color: #fff; }
        .badge-generic { background: #6b7280; color: #fff; }

        .cb-desc {
            font-size: 7px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-top: 0.5px;
            margin-bottom: 0.5px;
            opacity: 0.85;
            color: inherit;
        }

        /* Extra printable fields (Pre-survey hrs and Corrosion dates) */
        .cb-extra {
            font-size: 6.5px;
            line-height: 1;
            font-weight: 600;
            opacity: 0.9;
            margin-top: 0.5px;
            color: inherit;
        }

        /* Custom color coding statuses (Light Theme) */
        .s-normal {
            background-color: var(--blue-normal) !important;
            border: 1px solid var(--blue-border) !important;
            color: var(--blue-text) !important;
        }
        .s-danger {
            background-color: var(--red-danger) !important;
            border: 1.5px solid var(--red-border) !important;
            box-shadow: 0 0 4px rgba(239, 68, 68, 0.2);
            color: var(--red-text) !important;
        }
        .s-cdone {
            background-color: var(--yellow-done) !important;
            border: 1px solid var(--yellow-border) !important;
            color: var(--yellow-text) !important;
        }
        .s-outturned {
            background-color: var(--green-outturned) !important;
            border: 1px solid var(--green-border) !important;
            color: var(--green-text) !important;
        }
        .s-corr {
            background-color: var(--orange-corr) !important;
            border: 1px solid var(--orange-border) !important;
            color: var(--orange-text) !important;
        }

        /* Traverser blocks */
        .traverser-row {
            height: 10px;
            background: repeating-linear-gradient(
                -45deg,
                #e2e8f0,
                #e2e8f0 4px,
                #f1f5f9 4px,
                #f1f5f9 8px
            );
            border: 1px solid var(--border-color);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6.5px;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Flat sections (Yard, incoming, central) */
        .flat-row-container {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        /* ── PRINT MEDIA RULES ── */
        @media print {
            @page {
                size: A4 landscape;
                margin: 0.3cm;
            }
            body {
                background: #ffffff !important;
                color: #000000 !important;
                padding: 0 !important;
                font-size: 8pt;
            }
            .no-print {
                display: none !important;
            }
            .report-page {
                max-width: 100% !important;
                width: 100% !important;
                gap: 4px !important;
            }
            .zone {
                background: #ffffff !important;
                border-color: #cbd5e1 !important;
            }
        }
    </style>
</head>
<body>

    <!-- Loading screen -->
    <div class="loading-screen" id="loading">
        <div class="spinner"></div>
        <div>Generating Printable Aerial & Targets Report...</div>
    </div>

    <!-- Floating Action Buttons -->
    <div class="no-print-actions no-print">
        <a href="/cr" class="btn-action btn-back">⬅ Back to Dashboard</a>
        <button onclick="window.print()" class="btn-action">🖨 Print / PDF</button>
    </div>

    <!-- Main Report Page -->
    <div class="report-page" id="main-report">
        <!-- Header -->
        <header class="report-header">
            <div class="report-title" id="report-title-text">Workshop Aerial View & Targets Report</div>
            <div class="report-date" id="report-date-text">As on Date: [Loading...]</div>
        </header>

        <!-- Targets & Achievements top section -->
        <section class="targets-section">
            <div class="section-title">POH Target vs Achievement (Current Month)</div>
            <div id="targets-table-container">
                <!-- Targets Table loaded dynamically -->
            </div>
        </section>

        <!-- Aerial view map bottom section -->
        <section class="map-section">
            <div class="section-title">Carriage Repair Shop Layout Map</div>
            <div class="shops-grid" id="shops-grid-container">
                <!-- Shops layout generated dynamically -->
            </div>
        </section>
    </div>

    <script>
        // Global variables for loaded data
        let _coaches = [];
        let _topology = {};
        let _aliases = {};
        let _twoSlotLines = [];

        // Formatting Helpers
        function formatShortDate(dateStr) {
            if (!dateStr || dateStr.toLowerCase().includes('none') || dateStr.toLowerCase().includes('null')) return '';
            let clean = dateStr.replace('GSheet: ', '').trim();
            // Match DD/MM/YYYY or DD/MM/YY
            let match = clean.match(/^(\d{1,2})[\/\-](\d{1,2})/);
            if (match) {
                return `${match[1].padStart(2, '0')}/${match[2].padStart(2, '0')}`;
            }
            // Match YYYY-MM-DD
            let matchYmd = clean.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
            if (matchYmd) {
                return `${matchYmd[3].padStart(2, '0')}/${matchYmd[2].padStart(2, '0')}`;
            }
            return clean;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // Resolves the color status styling
        function getStatusClass(coach) {
            if (!coach) return 's-normal';
            const s = (coach.AERIAL_STATUS || coach.status || '').toUpperCase();
            if (s.includes('DANGER')) return 's-danger';
            if (s.includes('UNDER CORROSION') || s === 'CORROSION') return 's-corr';
            if (s.includes('CORROSION DONE') || s.includes('CORROSION COMPLETED')) return 's-cdone';
            if (s.includes('OUTTURNED') || s.includes('DESPATCHED')) return 's-outturned';
            return 's-normal';
        }

        function getFamilyBadge(coach) {
            const family = (coach.family || '').toUpperCase();
            const desc = (coach.coach_desc || '').toUpperCase();
            if (family === 'LHB') return '<span class="c-badge badge-lhb">LHB</span>';
            if (family === 'TW') return '<span class="c-badge badge-tw">TW</span>';
            if (family === 'ICF') return '<span class="c-badge badge-icf">ICF</span>';
            if (family === 'NMG') return '<span class="c-badge badge-nmg">NMG</span>';
            if (family === 'DEMU' || family === 'EMU' || family === 'MEMU' || family.includes('TC') || desc.includes('DPC') || desc.includes('DTC') || desc.includes('TC')) {
                let text = 'TC';
                if (desc.includes('DPC')) text = 'DPC';
                else if (desc.includes('DTC')) text = 'DTC';
                return `<span class="c-badge badge-tc">${text}</span>`;
            }
            return `<span class="c-badge badge-generic">${escapeHtml(family || 'COACH')}</span>`;
        }

        // Look up coaches at slots or pits
        function getCoachesForPit(prefix) {
            if (!_coaches || !_coaches.length) return [];
            
            const prefixes = [prefix];
            if (_aliases) {
                for (const [alias, canonical] of Object.entries(_aliases)) {
                    if (canonical.toUpperCase() === prefix.toUpperCase()) prefixes.push(alias);
                    if (alias.toUpperCase() === prefix.toUpperCase()) prefixes.push(canonical);
                }
            }

            return _coaches.filter(c => {
                const pit = (c.pitnum || c.location || '').toUpperCase().trim();
                
                // If this exact pit alias maps to a different prefix, exclude
                if (_aliases) {
                    const aliasKey = Object.keys(_aliases).find(k => k.toUpperCase() === pit);
                    if (aliasKey && _aliases[aliasKey].toUpperCase() !== prefix.toUpperCase()) {
                        return false;
                    }
                }

                for (const pfx of prefixes) {
                    const up = pfx.toUpperCase();
                    if (pit === up) return true;
                    if (pit === up + '_1' || pit === up + '_2') return true;
                    if (pit.startsWith(up) && /^_?\d?$/.test(pit.slice(up.length))) return true;
                }
                return false;
            });
        }

        function getCoachAtSlot(prefix, slot) {
            const all = getCoachesForPit(prefix);
            const slotStr = prefix.toUpperCase() + '_' + slot;
            
            // Try exact slot match
            const exact = all.find(c => (c.pitnum || c.location || '').toUpperCase().trim() === slotStr);
            if (exact) return exact;

            // Slot 1 defaults
            if (slot === 1) {
                const plain = all.find(c => {
                    const pit = (c.pitnum || c.location || '').toUpperCase().trim();
                    if (pit === prefix.toUpperCase()) return true;
                    if (_aliases) {
                        const aliasKey = Object.keys(_aliases).find(k => k.toUpperCase() === pit);
                        if (aliasKey && _aliases[aliasKey].toUpperCase() === prefix.toUpperCase() && !pit.includes('_')) {
                            return true;
                        }
                    }
                    return false;
                });
                if (plain) return plain;
            }

            // Alias checking
            if (_aliases) {
                for (const [alias, canonical] of Object.entries(_aliases)) {
                    if (canonical.toUpperCase() === prefix.toUpperCase()) {
                        const parts = alias.split('_');
                        const aliasSlot = parts.length > 1 ? parts[parts.length - 1] : '';
                        if (aliasSlot === String(slot)) {
                            const match = all.find(c => (c.pitnum || c.location || '').toUpperCase().trim() === alias.toUpperCase());
                            if (match) return match;
                        }
                    }
                }
            }
            return null;
        }

        // Generate Coach box Card
        function coachBoxHtml(coach) {
            if (!coach) return '';
            const num = coach.coachno || '?';
            const cls = getStatusClass(coach);
            const type = coach.coach_desc || coach.coach_type || '';
            const repair = coach.repair_type || '';
            const days = coach.IN_DAYS;
            const daysStr = (days !== null && days !== undefined && days !== '') ? days + 'd' : '';
            const sub = [type, repair, daysStr].filter(Boolean).join(' | ');

            // Pre-survey hours
            let preHours = coach.presurveyhrs || '';
            let preHtml = preHours ? `<div class="cb-extra">Pre: ${preHours}h</div>` : '';

            // Corrosion Dates
            let corrHtml = '';
            let corrPlace = coach.corr_place || '';
            let corrComp = coach.corr_comp || '';
            if (corrPlace && !corrPlace.toLowerCase().includes('none') && !corrPlace.toLowerCase().includes('null')) {
                let inStr = formatShortDate(corrPlace);
                let outStr = corrComp ? formatShortDate(corrComp) : 'Pend';
                corrHtml = `<div class="cb-extra">C: ${inStr} - ${outStr}</div>`;
            }

            return `
                <div class="coach-box ${cls}">
                    <div class="cb-header">
                        <span class="cb-num">${escapeHtml(num)}</span>
                        ${getFamilyBadge(coach)}
                    </div>
                    <div class="cb-desc">${escapeHtml(sub)}</div>
                    ${preHtml}
                    ${corrHtml}
                </div>
            `;
        }

        // Render nodes
        function renderShop(title, pits, label) {
            let html = `<div class="zone">`;
            html += `<div class="zone-title">${escapeHtml(label || title)}</div>`;
            pits.forEach(pit => {
                const isTwoSlot = _twoSlotLines.includes(pit);
                html += `<div class="line-row">`;
                html += `<div class="line-name">${escapeHtml(pit)}</div>`;
                html += `<div class="coach-row">`;
                if (isTwoSlot) {
                    for (let slot = 1; slot <= 2; slot++) {
                        const c = getCoachAtSlot(pit, slot);
                        html += c ? coachBoxHtml(c) : `<div class="empty-box">—</div>`;
                    }
                } else {
                    const coaches = getCoachesForPit(pit);
                    if (coaches.length) {
                        coaches.forEach(c => { html += coachBoxHtml(c); });
                    } else {
                        html += `<div class="empty-box">—</div>`;
                    }
                }
                html += `</div></div>`;
            });
            html += `</div>`;
            return html;
        }

        function renderFlat(title, pits, label) {
            let html = `<div class="zone">`;
            html += `<div class="zone-title">${escapeHtml(label || title)}</div>`;
            
            if (title === 'YARD') {
                // Show Yard in linear way at bottom side (single horizontal row of all yard coaches)
                html += `<div class="coach-row" style="display:flex;flex-wrap:wrap;gap:4px;padding:2px 0;">`;
                let hasCoaches = false;
                pits.forEach(pit => {
                    const coaches = getCoachesForPit(pit);
                    coaches.forEach(c => {
                        hasCoaches = true;
                        html += coachBoxHtml(c);
                    });
                });
                if (!hasCoaches) {
                    html += `<div style="font-size:8px;color:var(--text-muted);padding:4px;">—</div>`;
                }
                html += `</div>`;
            } else {
                html += `<div class="flat-row-container">`;
                pits.forEach(pit => {
                    const coaches = getCoachesForPit(pit);
                    if (coaches.length) {
                        html += `<div class="line-row">`;
                        html += `<div class="line-name">${escapeHtml(pit)}</div>`;
                        html += `<div class="coach-row" style="flex-wrap:wrap;gap:4px;">`;
                        coaches.forEach(c => { html += coachBoxHtml(c); });
                        html += `</div></div>`;
                    }
                });
                html += `</div>`;
            }
            html += `</div>`;
            return html;
        }

        function renderTraverser(label) {
            return `<div class="traverser-row">${escapeHtml(label)}</div>`;
        }

        function renderLayoutNode(node) {
            if (!node) return '';
            const type = node.type;

            if (type === 'row') {
                let html = `<div style="display:flex;gap:6px;width:100%;align-items:stretch;">`;
                (node.zones || []).forEach((z, idx) => {
                    const colStyle = node.cols && node.cols[idx] ? ` style="flex:${node.cols[idx]}"` : ' style="flex:1"';
                    html += `<div${colStyle}>${renderLayoutNode(z)}</div>`;
                });
                html += `</div>`;
                return html;
            }

            if (type === 'stack') {
                let html = `<div style="display:flex;flex-direction:column;gap:6px;width:100%;">`;
                (node.zones || []).forEach(z => {
                    html += renderLayoutNode(z);
                });
                html += `</div>`;
                return html;
            }

            if (type === 'shop') {
                return renderShop(node.zone, node.order || node.pits || [], node.label);
            }

            if (type === 'flat') {
                return renderFlat(node.zone, node.pitnums || [], node.label);
            }

            if (type === 'traverser') {
                return renderTraverser(node.label || 'TRAVERSER');
            }

            return '';
        }

        // Initialize report load
        async function loadReportData() {
            try {
                // Set current date in header
                const today = new Date();
                const dateOptions = { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' };
                document.getElementById('report-date-text').textContent = "As on Date: " + today.toLocaleString('en-GB', dateOptions);

                // Determine Current FY
                const currentMonth = today.getMonth() + 1; // 1-indexed
                const currentYear = today.getFullYear();
                const currentFy = (currentMonth >= 4) 
                    ? `${currentYear}-${String(currentYear + 1).slice(-2)}` 
                    : `${currentYear - 1}-${String(currentYear).slice(-2)}`;

                // 1. Fetch Targets Data
                const targetsResp = await fetch(`/api/poh/targets?fy=${currentFy}`);
                const targetsData = await targetsResp.json();
                
                // Filter to current calendar month
                const monthlyTargets = targetsData.filter(t => t.month === currentMonth && t.type === 'monthly');
                
                // Group targets to: ICF NAC, LHB AC, LHB NAC, TC
                const groupedTargets = {
                    "ICF NAC": { target: 0, actual: 0 },
                    "LHB AC": { target: 0, actual: 0 },
                    "LHB NAC": { target: 0, actual: 0 },
                    "TC": { target: 0, actual: 0 }
                };

                monthlyTargets.forEach(t => {
                    const fam = t.family.toUpperCase();
                    if (fam.includes("ICF") && fam.includes("NAC")) {
                        groupedTargets["ICF NAC"].target += t.target;
                        groupedTargets["ICF NAC"].actual += t.actual;
                    } else if (fam.includes("LHB") && fam.includes("AC")) {
                        groupedTargets["LHB AC"].target += t.target;
                        groupedTargets["LHB AC"].actual += t.actual;
                    } else if (fam.includes("LHB") && fam.includes("NAC")) {
                        groupedTargets["LHB NAC"].target += t.target;
                        groupedTargets["LHB NAC"].actual += t.actual;
                    } else if (fam.includes("EMU") || fam.includes("MEMU") || fam.includes("DEMU") || fam.includes("TC") || fam.includes("DTC") || fam.includes("DPC")) {
                        groupedTargets["TC"].target += t.target;
                        groupedTargets["TC"].actual += t.actual;
                    }
                });

                // Render Targets Table
                let targetsHtml = `
                    <table class="targets-table">
                        <thead>
                            <tr>
                                <th>Coach Stock Type</th>
                                <th style="text-align:right;">Target Qty</th>
                                <th style="text-align:right;">Achieved Qty</th>
                                <th style="text-align:right;">Variance</th>
                                <th style="text-align:right;">Working Days</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                let totalTarget = 0;
                let totalActual = 0;
                let workingDays = monthlyTargets.length > 0 ? monthlyTargets[0].working_days : 0;

                const targetKeys = ["ICF NAC", "LHB AC", "LHB NAC", "TC"];
                targetKeys.forEach(key => {
                    const t = groupedTargets[key];
                    totalTarget += t.target;
                    totalActual += t.actual;
                    const variance = t.actual - t.target;
                    const varCls = variance < 0 ? 'var-neg' : (variance > 0 ? 'var-pos' : '');
                    const varStr = variance > 0 ? `+${variance}` : variance;
                    
                    targetsHtml += `
                        <tr>
                            <td style="font-weight:600;">${key}</td>
                            <td style="text-align:right;font-weight:700;">${t.target}</td>
                            <td style="text-align:right;font-weight:700;">${t.actual}</td>
                            <td style="text-align:right;${varCls}">${varStr}</td>
                            <td style="text-align:right;color:var(--text-muted);">${workingDays}</td>
                        </tr>
                    `;
                });

                // Add total row
                const totalVariance = totalActual - totalTarget;
                const totVarCls = totalVariance < 0 ? 'var-neg' : (totalVariance > 0 ? 'var-pos' : '');
                const totVarStr = totalVariance > 0 ? `+${totalVariance}` : totalVariance;
                targetsHtml += `
                    <tr style="border-top:1.5px solid var(--border-color);">
                        <td style="font-weight:700;">TOTAL SHOP OUTTURN</td>
                        <td style="text-align:right;font-weight:700;color:var(--gold);">${totalTarget}</td>
                        <td style="text-align:right;font-weight:700;color:#16a34a;">${totalActual}</td>
                        <td style="text-align:right;${totVarCls}">${totVarStr}</td>
                        <td style="text-align:right;font-weight:700;">${workingDays}</td>
                    </tr>
                `;
                
                targetsHtml += `</tbody></table>`;
                document.getElementById('targets-table-container').innerHTML = targetsHtml;

                // Update Report Title
                const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
                document.getElementById('report-title-text').textContent = `Carriage Repair Shop Intelligence Report — ${monthNames[today.getMonth()]} ${currentYear}`;

                // 2. Fetch Aerial Map Data
                const aerialResp = await fetch('/api/aerial');
                const aerialData = await aerialResp.json();
                
                _coaches = aerialData.coaches || [];
                _aliases = aerialData.pitnum_aliases || {};
                _twoSlotLines = aerialData.two_slot_lines || [];

                // 3. Render natural workshop layout structure vertically
                const layout = aerialData.topology || [];
                
                let layoutHtml = '';
                layout.forEach(node => {
                    layoutHtml += renderLayoutNode(node);
                });
                document.getElementById('shops-grid-container').innerHTML = layoutHtml;

                // Hide loading screen
                document.getElementById('loading').style.display = 'none';

            } catch (err) {
                console.error("Error loading report data:", err);
                document.getElementById('loading').innerHTML = `
                    <div style="color:#ef4444;font-size:18px;font-weight:700;">Failed to Load Report Data</div>
                    <div style="color:var(--text-muted);margin-top:10px;">${err.message}</div>
                `;
            }
        }

        // Trigger on load
        window.addEventListener('DOMContentLoaded', loadReportData);
    </script>
</body>
</html>
